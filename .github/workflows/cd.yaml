name: CD

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  image:
    name: Build, smoke, and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="${GITHUB_SHA}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        env:
          DOCKER_IMAGE: ${{ steps.image.outputs.image }}
          DOCKER_TAG: ${{ steps.image.outputs.tag }}
        run: uv run nox -s docker_build

      - name: Smoke test image
        env:
          DOCKER_IMAGE: ${{ steps.image.outputs.image }}
          DOCKER_TAG: ${{ steps.image.outputs.tag }}
        run: uv run nox -s docker_smoke

      - name: Push image
        run: |
          docker tag "${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}" "${{ steps.image.outputs.image }}:latest"
          docker push "${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.image }}:latest"

  security:
    name: Security scans
    runs-on: ubuntu-latest
    needs: image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Scan image with Trivy
        id: trivy_image
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/workspace" \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --format sarif \
            --output /workspace/trivy-image.sarif \
            "${{ needs.image.outputs.image }}:${{ needs.image.outputs.tag }}"

      - name: Upload Trivy image SARIF
        id: upload_trivy_image
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh code-scanning upload-sarif --sarif trivy-image.sarif --category trivy-image

      - name: Scan repository with Trivy
        id: trivy_fs
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --exit-code 1 \
            --format sarif \
            --output /workspace/trivy-fs.sarif \
            /workspace

      - name: Upload Trivy filesystem SARIF
        id: upload_trivy_fs
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh code-scanning upload-sarif --sarif trivy-fs.sarif --category trivy-fs

      - name: Scan dependencies with OSV Scanner
        id: osv_scanner
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            ghcr.io/google/osv-scanner:latest \
            --recursive \
            --format sarif \
            --output /workspace/osv-scanner.sarif \
            /workspace

      - name: Upload OSV Scanner SARIF
        id: upload_osv_scanner
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh code-scanning upload-sarif --sarif osv-scanner.sarif --category osv-scanner

      - name: Scan Git history with Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            ghcr.io/gitleaks/gitleaks:latest detect \
            --source /workspace \
            --report-format sarif \
            --report-path /workspace/gitleaks.sarif \
            --redact

      - name: Upload Gitleaks SARIF
        id: upload_gitleaks
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh code-scanning upload-sarif --sarif gitleaks.sarif --category gitleaks

      - name: Fail on security findings
        if: always()
        run: |
          test "${{ steps.trivy_image.outcome }}" = "success"
          test "${{ steps.trivy_fs.outcome }}" = "success"
          test "${{ steps.osv_scanner.outcome }}" = "success"
          test "${{ steps.gitleaks.outcome }}" = "success"
          test "${{ steps.upload_trivy_image.outcome }}" = "success"
          test "${{ steps.upload_trivy_fs.outcome }}" = "success"
          test "${{ steps.upload_osv_scanner.outcome }}" = "success"
          test "${{ steps.upload_gitleaks.outcome }}" = "success"
